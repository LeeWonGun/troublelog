spring.application.name=troublelog_backend_test

spring.datasource.url=jdbc:h2:mem:troublelog;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

app.jwt.secret=troublelog-test-secret-key-must-be-at-least-32-bytes
app.jwt.expiration-ms=86400000
app.jwt.cookie.secure=false
app.jwt.cookie.same-site=Lax
app.security.csrf.enabled=false

app.mail.enabled=false
app.mail.provider=smtp
app.mail.resend.api-key=
app.mail.from=TroubleLog <test@example.com>
app.mail.verification-code-expiration-minutes=5

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
