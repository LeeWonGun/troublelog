spring.application.name=troublelog_backend

server.port=8080

# MySQL datasource
spring.datasource.url=jdbc:mysql://localhost:3306/troublelog?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=troublelog
spring.datasource.password=troublelog
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Mybatis
mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.type-aliases-package=com.min.edu
mybatis.configuration.map-underscore-to-camel-case=true