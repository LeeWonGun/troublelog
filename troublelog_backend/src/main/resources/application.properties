spring.config.import=optional:file:.env[.properties]

spring.application.name=troublelog_backend

server.port=8080

# MySQL datasource
spring.datasource.url=jdbc:mysql://localhost:3306/troublelog?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=troublelog
spring.datasource.password=troublelog
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Mybatis
mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.type-aliases-package=com.min.edu
mybatis.configuration.map-underscore-to-camel-case=true

# JWT HttpOnly cookie auth
app.jwt.secret=${JWT_SECRET:troublelog-local-development-secret-key-must-be-32-bytes}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.jwt.cookie.secure=${JWT_COOKIE_SECURE:false}
app.jwt.cookie.same-site=${JWT_COOKIE_SAME_SITE:Lax}

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:google-client-id-required}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:google-client-secret-required}
spring.security.oauth2.client.registration.google.scope=openid,email,profile
app.oauth2.success-redirect-uri=${OAUTH2_SUCCESS_REDIRECT_URI:http://localhost:5173/mockup-api-test.html}

# Email
app.mail.provider=${MAIL_PROVIDER:smtp}
app.mail.enabled=${MAIL_ENABLED:true}
app.mail.from=${MAIL_FROM:}
app.mail.verification-code-expiration-minutes=${MAIL_CODE_EXPIRATION_MINUTES:5}

# SMTP email
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Resend email
app.mail.resend.api-key=${RESEND_API_KEY:}
