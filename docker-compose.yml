services:
  mysql:
    image: mysql:8.0
    container_name: troublelog-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: troublelog
      MYSQL_USER: troublelog
      MYSQL_PASSWORD: troublelog
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - troublelog-mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

volumes:
  troublelog-mysql-data: